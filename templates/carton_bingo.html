<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartón de Bingo Interactivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #f6fafd;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-top: 1em;
            color: #2a4d69;
        }
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 95vw;
            width: 400px;
            margin: 2em auto;
            background: #e3eaf2;
            border-radius: 12px;
            box-shadow: 0 2px 12px #0001;
            padding: 12px;
        }
        .bingo-cell, .bingo-header {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            border-radius: 8px;
            user-select: none;
            transition: background 0.2s, color 0.2s;
        }
        .bingo-header {
            background: #2a4d69;
            color: #fff;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .bingo-cell {
            background: #fff;
            color: #2a4d69;
            border: 2px solid #b0c4de;
            cursor: pointer;
        }
        .bingo-cell.marked {
            background: #f9d423;
            color: #222;
            border-color: #f9d423;
            font-weight: bold;
            box-shadow: 0 0 0 2px #f9d42355;
        }
        @media (max-width: 600px) {
            .bingo-board {
                width: 98vw;
                padding: 4vw;
            }
        }
    </style>
</head>
<body>
    <h1>Cartón de Bingo Interactivo</h1>
    <div class="bingo-board" id="bingo-board">
        {% for letra in ['B','I','N','G','O'] %}
            <div class="bingo-header">{{ letra }}</div>
        {% endfor %}
        {% for fila in carton %}
            {% for numero in fila %}
                <div class="bingo-cell" onclick="toggleMark(this)">{{ numero }}</div>
            {% endfor %}
        {% endfor %}
    </div>
    <script>
        function toggleMark(cell) {
            cell.classList.toggle('marked');
        }
    </script>
</body>
</html>
