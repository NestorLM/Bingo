<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo - Panel Principal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="layout">
        <section class="hero card">
            <p class="label">Numero actual</p>
            <div id="numero-grande" class="numero-grande">--</div>
            <p class="sub">Sortea y sigue el ritmo del juego en tiempo real.</p>
        </section>

        <section class="control card">
            <div class="header-row">
                <div>
                    <h1>Bingo</h1>
                    <p class="sub">Panel de control para el anfitrion.</p>
                </div>
                <div class="qr-wrap">
                    <img src="data:image/png;base64,{{ qr_base64 }}" alt="QR para abrir carton interactivo" class="qr-image">
                    <span>Abrir carton</span>
                </div>
            </div>

            <div class="actions">
                <button id="sortear-btn" class="btn btn-primary">Sortear numero</button>
                <button id="reset-btn" class="btn btn-secondary">Reiniciar ronda</button>
            </div>

            <form action="/generar_pdf" method="post" class="pdf-form">
                <label for="cantidad_hojas">Hojas PDF</label>
                <input type="number" id="cantidad_hojas" name="cantidad_hojas" min="1" value="1">
                <button type="submit" class="btn btn-accent">Generar cartones</button>
            </form>

            <div id="fin-mensaje" class="fin">Todos los numeros fueron sorteados.</div>

            <div id="numeros-sorteados" class="table-wrap">
                <table id="bingo-table">
                    <thead>
                        <tr>
                            <th>B</th>
                            <th>I</th>
                            <th>N</th>
                            <th>G</th>
                            <th>O</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for num in range(1, 19) %}
                            <tr>
                                <td id="{{ num }}">{{ num }}</td>
                                <td id="{{ num + 18 }}">{{ num + 18 }}</td>
                                <td id="{{ num + 36 }}">{{ num + 36 }}</td>
                                <td id="{{ num + 54 }}">{{ num + 54 }}</td>
                                <td id="{{ num + 72 }}">{{ num + 72 }}</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>

        <aside class="history card">
            <p class="label">Ultimos 5</p>
            <div id="lista-ultimos" class="hist-list"></div>
        </aside>
    </main>

    <script>
        let ultimos = [];

        function mostrarNumero(letra, numero) {
            const texto = letra + " " + numero;
            document.getElementById("numero-grande").textContent = texto;
            ultimos.unshift(texto);
            if (ultimos.length > 5) {
                ultimos = ultimos.slice(0, 5);
            }
            const lista = document.getElementById("lista-ultimos");
            lista.innerHTML = "";
            ultimos.forEach((n) => {
                const div = document.createElement("div");
                div.className = "hist-item";
                div.textContent = n;
                lista.appendChild(div);
            });
        }

        document.getElementById("sortear-btn").addEventListener("click", function () {
            fetch("/sortear_numero")
                .then((response) => response.json())
                .then((data) => {
                    if (data.fin || data.numero === 0) {
                        document.getElementById("fin-mensaje").style.display = "block";
                        document.getElementById("sortear-btn").disabled = true;
                        return;
                    }

                    const cell = document.getElementById(data.numero);
                    if (cell) {
                        cell.classList.add("selected");
                    }
                    mostrarNumero(data.letra, data.numero);
                });
        });

        document.getElementById("reset-btn").addEventListener("click", function () {
            fetch("/reset")
                .then(() => {
                    const cells = document.querySelectorAll("#bingo-table td");
                    cells.forEach((cell) => {
                        cell.classList.remove("selected");
                    });
                    document.getElementById("fin-mensaje").style.display = "none";
                    document.getElementById("sortear-btn").disabled = false;
                    ultimos = [];
                    document.getElementById("numero-grande").textContent = "--";
                    document.getElementById("lista-ultimos").innerHTML = "";
                });
        });
    </script>
</body>
</html>
